<!doctype html>
<html lang="id">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>KML / KMZ Renamer By Wahid</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>

<style>
body{margin:0;font-family:sans-serif;background:#f1f5f9}
.container{max-width:1000px;margin:auto;padding:20px}
.card{background:white;padding:20px;border-radius:12px}
.previewItem{border:1px solid #ddd;margin-bottom:10px;padding:10px;border-radius:10px}
</style>
</head>

<body>
<div class="container">
<div class="card">

<h2>KML / KMZ Renamer</h2>

<input id="fileinput" type="file" accept=".kml,.kmz"><br><br>

<input id="prefix" placeholder="Prefix" value="PL-">
<input id="startnum" value="01">
<select id="padding">
  <option value="0">No pad</option>
  <option value="2">2</option>
  <option value="3" selected>3</option>
</select>

<br><br>

<button id="toggleAll">Uncheck All</button>
<button id="preview">Preview</button>
<button id="rename">Download</button>

<div id="previewBox"></div>

</div>
</div>

<script>
let previewData=[]
let selectedMap=new Map()
let allChecked=true
let zipRef,kmlPath,origFile

function pad(n,w){return w?String(n).padStart(w,'0'):n}

async function loadFile(f){
  origFile=f
  if(f.name.endsWith('.kmz')){
    zipRef=await JSZip.loadAsync(await f.arrayBuffer())
    kmlPath=Object.keys(zipRef.files).find(p=>p.endsWith('.kml'))
    return await zipRef.file(kmlPath).async('text')
  }
  return await f.text()
}

preview.onclick=async()=>{
  const f=fileinput.files[0]
  if(!f) return alert("pilih file")

  const xml=new DOMParser().parseFromString(await loadFile(f),'text/xml')
  const placemarks=xml.getElementsByTagName("Placemark")

  previewData=[]
  selectedMap=new Map()
  allChecked=true
  toggleAll.textContent="Uncheck All"

  let num=parseInt(startnum.value)

  previewBox.innerHTML=""

  for(let i=0;i<placemarks.length;i++){
    const pm=placemarks[i]
    const oldName=pm.getElementsByTagName("name")[0]?.textContent||""

    selectedMap.set(i,true)

    const newName=prefix.value+pad(num,padding.value)
    num++

    previewData.push({pm,newName})

    const div=document.createElement("div")
    div.className="previewItem"
    div.innerHTML=`
      <input type="checkbox" data-i="${i}" checked>
      <b>${oldName}</b> → ${newName}
    `
    previewBox.appendChild(div)
  }
}

previewBox.addEventListener("change",e=>{
  if(e.target.type==="checkbox"){
    selectedMap.set(+e.target.dataset.i,e.target.checked)
  }
})

toggleAll.onclick=()=>{
  allChecked=!allChecked
  document.querySelectorAll("#previewBox input").forEach((c,i)=>{
    c.checked=allChecked
    selectedMap.set(i,allChecked)
  })
  toggleAll.textContent=allChecked?"Uncheck All":"Check All"
}

rename.onclick=async()=>{
  if(!previewData.length) return alert("preview dulu")

  let n=parseInt(startnum.value)

  previewData.forEach((p,i)=>{
    if(!selectedMap.get(i)) return

    const newName=prefix.value+pad(n,padding.value)
    n++

    let nameNode=p.pm.getElementsByTagName("name")[0]
    if(!nameNode){
      nameNode=p.pm.ownerDocument.createElement("name")
      p.pm.prepend(nameNode)
    }
    nameNode.textContent=newName
  })

  const xml=new XMLSerializer().serializeToString(previewData[0].pm.ownerDocument)

  if(origFile.name.endsWith('.kmz')){
    zipRef.file(kmlPath,xml)
    const blob=await zipRef.generateAsync({type:"blob"})
    download(blob,"result.kmz")
  }else{
    download(new Blob([xml]),"result.kml")
  }
}

function download(blob,name){
  const a=document.createElement("a")
  a.href=URL.createObjectURL(blob)
  a.download=name
  a.click()
}
</script>

</body>
</html>
